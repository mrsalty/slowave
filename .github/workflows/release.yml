name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write  # for GitHub release creation

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check tag matches pyproject.toml version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME#slowave-}"
          TAG="${TAG#v}"
          TOML=$(python -c "import tomllib; d=tomllib.load(open('pyproject.toml','rb')); print(d['project']['version'])")
          echo "version=$TOML" >> "$GITHUB_OUTPUT"
          if [ "$TAG" != "$TOML" ]; then
            echo "Tag $TAG does not match pyproject.toml version $TOML"
            exit 1
          fi

      - name: Build
        run: |
          pip install build
          python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: dist, path: dist/ }
      - name: Publish to PyPI
        run: |
          pip install "twine>=6.1"
          twine upload dist/* --non-interactive
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

  github-release:
    needs: [build, publish-pypi]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}

      - name: Update Homebrew formula
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          URL="https://github.com/mrsalty/slowave/archive/refs/tags/v${VERSION}.tar.gz"
          SHA=$(curl -sL "$URL" | shasum -a 256 | awk '{print $1}')
          sed -i "s|url \".*\"|url \"$URL\"|"       Formula/slowave.rb
          sed -i "s|sha256 \".*\"|sha256 \"$SHA\"|" Formula/slowave.rb
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/slowave.rb
          git diff --cached --quiet || git commit -m "chore: bump Homebrew formula to ${VERSION}"
          git push
