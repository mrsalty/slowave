name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write  # for GitHub release creation

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check tag matches pyproject.toml version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          TOML=$(python -c "import tomllib; d=tomllib.load(open('pyproject.toml','rb')); print(d['project']['version'])")
          echo "version=$TOML" >> "$GITHUB_OUTPUT"
          if [ "$TAG" != "$TOML" ]; then
            echo "Tag $TAG does not match pyproject.toml version $TOML"
            exit 1
          fi

      - name: Build
        run: |
          pip install build
          python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # To re-enable PyPI publishing later:
  #   1. Register `slowave` on PyPI
  #   2. Configure PyPI Trusted Publisher pointing at this repo + release.yml + environment `pypi`
  #   3. Uncomment the publish-pypi job and add it to github-release's `needs`
  #
  # publish-pypi:
  #   needs: build
  #   runs-on: ubuntu-latest
  #   environment: pypi
  #   permissions:
  #     id-token: write
  #   steps:
  #     - uses: actions/download-artifact@v4
  #       with: { name: dist, path: dist/ }
  #     - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
