name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # When a Release Please PR is merged, the action creates the tag and
      # GitHub release. Build artifacts here and attach them to that release.
      # The existing tag-triggered release.yml remains useful for manually
      # pushed tags; tags created by GITHUB_TOKEN do not trigger another run.
      - name: Checkout repository
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v4

      - name: Set up Python
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify release version
        if: ${{ steps.release.outputs.release_created }}
        run: |
          TAG="${{ steps.release.outputs.tag_name }}"
          TAG_VERSION="${TAG#slowave-}"
          TAG_VERSION="${TAG_VERSION#v}"
          TOML_VERSION=$(python -c "import tomllib; d=tomllib.load(open('pyproject.toml','rb')); print(d['project']['version'])")
          if [ "$TAG_VERSION" != "$TOML_VERSION" ]; then
            echo "Release tag $TAG does not match pyproject.toml version $TOML_VERSION"
            exit 1
          fi

      - name: Build package
        if: ${{ steps.release.outputs.release_created }}
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload artifacts to GitHub release
        if: ${{ steps.release.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ steps.release.outputs.tag_name }}" dist/* --clobber