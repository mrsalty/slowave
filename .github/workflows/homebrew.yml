name: Update Homebrew Formula

# Runs on every published GitHub release.
# Computes the sha256 of the released tarball and updates Formula/slowave.rb
# directly in this repo. No separate tap repo needed — users install via:
#   brew tap mrsalty/slowave https://github.com/mrsalty/slowave
#   brew install slowave

on:
  release:
    types: [published]

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tarball sha256
        id: sha
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          URL="https://github.com/mrsalty/slowave/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz"
          SHA=$(curl -sL "$URL" | shasum -a 256 | awk '{print $1}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "url=$URL"         >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA"      >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION  SHA256: $SHA"

      - name: Update Formula/slowave.rb
        run: |
          URL="${{ steps.sha.outputs.url }}"
          SHA="${{ steps.sha.outputs.sha256 }}"
          sed -i "s|url \".*\"|url \"$URL\"|"       Formula/slowave.rb
          sed -i "s|sha256 \".*\"|sha256 \"$SHA\"|" Formula/slowave.rb
          sed -i "s|license \".*\"|license \"AGPL-3.0-or-later\"|" Formula/slowave.rb

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/slowave.rb
          git diff --cached --quiet || git commit -m "chore: bump Homebrew formula to ${{ steps.sha.outputs.version }}"
          git push
